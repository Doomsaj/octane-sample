services:

  # ── Shared infrastructure ─────────────────────────────────────────────────
  mysql:
    image: rmysql:8.0
    environment:
      MYSQL_DATABASE: laravel_benchmark
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql-data:/var/lib/mysql
    networks: [app]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: rredis:7-alpine
    networks: [app]

  # ── PHP-FPM + Nginx ───────────────────────────────────────────────────────
  php-fpm:
    image: ${GHCR_IMAGE:-ghcr.io/your-org/octane-sample}:${FPM_TAG:-fpm-latest}
    build:
      context: .
      dockerfile: Dockerfile.fpm
    environment: &app_env
      APP_NAME: "Laravel Benchmark"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:VWUIX60m4+eLMKKfWJfIjciOxvI5PIcja5JhS4dsXk0=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel_benchmark
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: sync
      SERVER_TYPE: fpm
    entrypoint: ["/bin/sh", "/var/www/docker/entrypoint.sh"]
    command: ["php-fpm"]
    depends_on:
      mysql:
        condition: service_healthy
    networks: [app]

  nginx:
    image: rnginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [php-fpm]
    networks: [app]

  # ── Octane / FrankenPHP ───────────────────────────────────────────────────
  octane:
    image: ${GHCR_IMAGE:-ghcr.io/your-org/octane-sample}:${OCTANE_TAG:-octane-latest}
    build:
      context: .
      dockerfile: Dockerfile.octane
    ports:
      - "8081:8000"
    environment:
      <<: *app_env
      SERVER_TYPE: octane
      OCTANE_SERVER: frankenphp
      OCTANE_WORKERS: 4
    entrypoint: ["/bin/sh", "/var/www/docker/entrypoint.sh"]
    command: ["php", "artisan", "octane:start", "--server=frankenphp", "--host=0.0.0.0", "--port=8000", "--workers=4"]
    depends_on:
      mysql:
        condition: service_healthy
    networks: [app]

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: rprom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --storage.tsdb.retention.time=2h
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [app]

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: rgrafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]
    networks: [app]

  # ── k6 load tester (run with: docker compose --profile testing run k6) ───
  k6:
    image: rgrafana/k6:latest
    profiles: [testing]
    volumes:
      - ./k6:/scripts
    environment:
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_STATS: p(50),p(90),p(95),p(99),min,max
      K6_PROMETHEUS_RW_TAG_KEYS: server,name,url
      FPM_URL: http://nginx:80
      OCTANE_URL: http://octane:8000
    command: run /scripts/load-test.js --out experimental-prometheus-rw
    depends_on: [nginx, octane, prometheus]
    networks: [app]

networks:
  app:
    driver: bridge

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
