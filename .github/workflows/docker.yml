name: Build & Push Docker Images

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Build base images (PHP + extensions + composer, no app code)
# These are pushed once and reused by every app build, keeping app layers thin.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-base:
    name: Base — ${{ matrix.variant }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: fpm
            dockerfile: docker/base/Dockerfile.fpm
          - variant: octane
            dockerfile: docker/base/Dockerfile.octane

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=raw,value=base-${{ matrix.variant }}-latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=base-${{ matrix.variant }}-sha-${{ steps.sha.outputs.short }}
            type=ref,event=branch,prefix=base-${{ matrix.variant }}-
            type=semver,pattern={{version}},prefix=base-${{ matrix.variant }}-

      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=base-${{ matrix.variant }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Build app images (composer install + app code, FROM base image)
# Runs after build-base so the SHA-tagged base is available in GHCR.
# ─────────────────────────────────────────────────────────────────────────────
  build-app:
    name: App — ${{ matrix.variant }}
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: fpm
            dockerfile: Dockerfile.fpm
          - variant: octane
            dockerfile: Dockerfile.octane

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # On PRs the base was not pushed, so fall back to the last -latest tag.
      # On main/tag pushes use the SHA-pinned base built moments ago.
      - name: Resolve base image tag
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=base-${{ matrix.variant }}-latest" >> $GITHUB_OUTPUT
          else
            echo "ref=base-${{ matrix.variant }}-sha-${{ steps.sha.outputs.short }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=raw,value=${{ matrix.variant }}-latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=sha,prefix=${{ matrix.variant }}-sha-,format=short
            type=ref,event=branch,prefix=${{ matrix.variant }}-
            type=ref,event=pr,prefix=${{ matrix.variant }}-pr-
            type=semver,pattern={{version}},prefix=${{ matrix.variant }}-
            type=semver,pattern={{major}}.{{minor}},prefix=${{ matrix.variant }}-

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_BASE }}:${{ steps.base.outputs.ref }}
          cache-from: type=gha,scope=${{ matrix.variant }}-app
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-app

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "${{ matrix.variant }} → ${{ steps.meta.outputs.tags }}"
